<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <title>Trivia!</title>
    <script>
        // Wait for the DOM to load
        document.addEventListener('DOMContentLoaded', function() {
            // Handle multiple-choice questions
            let correctButtons = document.querySelectorAll('.correct');
            let incorrectButtons = document.querySelectorAll('.incorrect');

            // Add event listeners to correct buttons
            correctButtons.forEach(button => {
                button.addEventListener('click', function() {
                    button.style.backgroundColor = 'green';
                    button.parentElement.querySelector('.feedback').innerHTML = 'Correct!';
                });
            });

            // Add event listeners to incorrect buttons
            incorrectButtons.forEach(button => {
                button.addEventListener('click', function() {
                    button.style.backgroundColor = 'red';
                    button.parentElement.querySelector('.feedback').innerHTML = 'Incorrect';
                });
            });

            // Handle free-response question
            document.querySelector('#check').addEventListener('click', function() {
                let input = document.querySelector('input');
                if (input.value.toLowerCase() === 'jupiter') {
                    input.style.backgroundColor = 'green';
                    input.parentElement.querySelector('.feedback').innerHTML = 'Correct!';
                } else {
                    input.style.backgroundColor = 'red';
                    input.parentElement.querySelector('.feedback').innerHTML = 'Incorrect';
                }
            });
        });
    </script>
</head>
<body>
    <div class="header">
        <h1>Trivia!</h1>
    </div>

    <div class="container">
        <!-- Part 1: Multiple Choice -->
        <div class="section">
            <h2>Part 1: Multiple Choice</h2>
            <hr>
            <h3>What is the capital of France?</h3>
            <button class="incorrect">Berlin</button>
            <button class="incorrect">Madrid</button>
            <button class="correct">Paris</button>
            <button class="incorrect">Rome</button>
            <p class="feedback"></p>
        </div>

        <!-- Part 2: Free Response -->
        <div class="section">
            <h2>Part 2: Free Response</h2>
            <hr>
            <h3>What is the largest planet in our solar system?</h3>
            <input type="text"></input>
            <button id="check">Check Answer</button>
            <p class="feedback"></p>
        </div>
    </div>
</body>
</html>
